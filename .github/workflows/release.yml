# Builds dist/katas.json from kata markdown files and publishes it
# as a GitHub release asset. Tags use date-based versioning: YYYY-MM-DD.N
# where N increments if multiple releases happen on the same date.

name: Build and Release Katas

on:
  push:
    branches: [main]
    paths: ['katas/[0-9][0-9][0-9]-*.md']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build dist/katas.json
        run: make dist

      - name: Compute Tag
        id: tag
        run: |
          today=$(date -u +%Y-%m-%d)
          last=$(git tag --list "${today}.*" --sort=-v:refname | head -n1)
          if [ -z "$last" ]; then
            seq=1
          else
            seq=$(( ${last##*.} + 1 ))
          fi
          echo "tag=${today}.${seq}" >> "$GITHUB_OUTPUT"

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${{ steps.tag.outputs.tag }}"
          dist/katas.json
          --generate-notes
